<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',system-ui,sans-serif;background:#f0f4f8;min-height:100vh}
#app{max-width:740px;margin:0 auto;padding:24px 16px 48px}
.hdr{background:#333F48;border-radius:14px 14px 0 0;padding:20px 24px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#475569}
.rb{font-size:11px;color:#475569;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:4px}
.rb:hover{color:#94a3b8}
.pt{background:#1e2d38;border-radius:4px;height:4px}
.pf{height:4px;border-radius:4px;background:linear-gradient(90deg,#C8102E,#e05c6e);transition:width .4s ease}
.sl{font-size:12px;color:#64748b;margin-top:8px}
.sl span{color:#e8909a;font-weight:600}
.card{background:#fff;border-radius:0 0 14px 14px;padding:32px 28px;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.ey{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#C8102E;margin-bottom:8px}
.ttl{font-family:'EB Garamond',Georgia,serif;font-size:22px;font-weight:700;color:#111827;margin-bottom:6px;line-height:1.3}
.sub{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6}
.og{display:grid;gap:10px;margin-bottom:8px}
.og.c2{grid-template-columns:1fr 1fr}
.og.c3{grid-template-columns:1fr 1fr 1fr}
.oc{padding:14px 16px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;display:flex;align-items:flex-start;gap:12px;width:100%;position:relative}
.oc:hover{border-color:#C8102E;background:#fff5f5}
.oc.sel{border-color:#C8102E;background:#fff5f5}
.oc.rec-opt{border-color:#16a34a}
.oc.rec-opt.sel{border-color:#15803d;background:#f0fdf4}
.rec-badge{position:absolute;top:-1px;right:10px;font-size:10px;font-weight:700;background:#16a34a;color:#fff;padding:2px 8px;border-radius:0 0 6px 6px;letter-spacing:.04em}
.oe{font-size:22px;flex-shrink:0;line-height:1.2}
.ol{font-size:14px;font-weight:600;color:#111827;line-height:1.3}
.oc.sel .ol{color:#C8102E}
.oc.rec-opt.sel .ol{color:#15803d}
.os{font-size:12px;color:#6b7280;margin-top:2px;line-height:1.4}
.rec-banner{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start}
.rec-banner.warn{background:#fffbeb;border-color:#fde68a}
.rec-icon{font-size:20px;flex-shrink:0}
.rec-text{font-size:13px;color:#166534;line-height:1.6}
.rec-banner.warn .rec-text{color:#92400e}
.rec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#16a34a;margin-bottom:3px}
.rec-banner.warn .rec-label{color:#d97706}
.override-link{font-size:12px;color:#6b7280;text-decoration:underline;cursor:pointer;margin-top:6px;display:inline-block}
.sv{font-size:36px;font-weight:700;color:#C8102E;margin-bottom:2px}
.sv span{font-size:16px;font-weight:400;color:#6b7280;margin-left:4px}
input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:#e2e8f0;outline:none;margin:12px 0 4px;touch-action:pan-x;cursor:grab}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#C8102E;cursor:grab;box-shadow:0 2px 8px rgba(196,30,58,.4);border:2px solid #fff;transition:transform .1s}input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.15)}input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#C8102E;cursor:grab;border:2px solid #fff;box-shadow:0 2px 8px rgba(196,30,58,.4)}
.sll{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:20px}
.num-row{display:flex;align-items:center;gap:0;margin-bottom:20px}
.nbt{width:44px;height:44px;border:1.5px solid #d1d5db;background:#f9fafb;font-size:20px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:background .1s}
.nbt:first-child{border-radius:8px 0 0 8px;border-right:none}
.nbt:last-child{border-radius:0 8px 8px 0;border-left:none}
.nbt:hover{background:#e5e7eb}
.ni{width:110px;height:44px;border:1.5px solid #d1d5db;text-align:center;font-size:18px;font-weight:700;color:#111827;font-family:inherit;border-left:none;border-right:none}
.ni:focus{outline:none;border-color:#C8102E}
.nu{font-size:13px;color:#6b7280;margin-left:10px}
.calc-box{background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:16px;margin-bottom:20px}
.calc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#C8102E;margin-bottom:10px}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.calc-item{font-size:13px;color:#374151}
.calc-item strong{color:#C8102E;font-size:15px}
.size-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:8px}
.size-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.sp{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#374151;font-family:inherit;transition:all .12s;position:relative}
.sp:hover{border-color:#C8102E}
.sp.sel{border-color:#C8102E;background:#C8102E;color:#fff}
.sp.suggested{border-color:#16a34a}
.sp.suggested::after{content:'suggested';position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;background:#16a34a;color:#fff;padding:1px 5px;border-radius:3px;white-space:nowrap}
.note{font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:10px 12px;margin-bottom:20px;line-height:1.5}
.note-info{font-size:12px;color:#9E0C24;background:#fff5f5;border:1px solid #fdd0d5;border-radius:7px;padding:10px 12px;margin-bottom:20px;line-height:1.5}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.bb{padding:10px 18px;background:none;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;font-family:inherit}
.bb:hover{border-color:#cbd5e1;color:#374151}
.nb{padding:11px 28px;background:#C8102E;border:none;border-radius:8px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:background .15s}
.nb:hover{background:#9E0C24}
.nb:disabled{background:#e8909a;cursor:default}
.rh{background:linear-gradient(135deg,#333F48 0%,#1e2d38 100%);border-radius:12px;padding:24px;margin-bottom:20px}
.rtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#64748b;margin-bottom:8px}
.rmod{font-family:'EB Garamond',Georgia,serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.01em}
.rmod-sub{font-family:'Poppins',sans-serif;font-size:14px;color:rgba(255,255,255,.55);margin-bottom:4px;font-weight:400}
.rdesc{font-size:14px;color:#94a3b8;line-height:1.5;margin-bottom:16px}
.rstats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:rgba(255,255,255,.07);border-radius:8px;padding:10px 12px}
.stv{font-size:18px;font-weight:700;color:#fff}
.stl{font-size:11px;color:#64748b;margin-top:2px}
.result-img-wrap{text-align:center;margin-bottom:20px;background:transparent;border:none;padding:10px}
.result-img{max-height:240px;max-width:100%;object-fit:contain}
.result-img-lbl{font-size:11px;color:#9ca3af;margin-top:8px}
.why-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:20px}
.why-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:10px}
.wrow{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px;align-items:flex-start}
.wrow:last-child{border-bottom:none}
.wck{color:#059669;flex-shrink:0;font-weight:700;margin-top:1px}
.wtx{color:#374151;line-height:1.5}
.ai-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:#92400e;line-height:1.7}
.ai-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#d97706;margin-bottom:6px}
.cs-note{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:#0c4a6e;line-height:1.6}
.cs-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0369a1;margin-bottom:4px}
.qb{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:20px}
.qt{font-family:'EB Garamond',Georgia,serif;font-size:16px;font-weight:700;color:#111827;margin-bottom:3px}
.qs{font-size:12px;color:#6b7280;margin-bottom:16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ff label,.ffw label{font-size:11px;color:#6b7280;display:block;margin-bottom:4px;font-weight:500}
.ff input,.ff select,.ffw input,.ffw select,.ffw textarea{width:100%;padding:9px 12px;border-radius:7px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit;color:#111827;background:#fff;transition:border .15s}
.ff input:focus,.ff select:focus,.ffw textarea:focus{outline:none;border-color:#C8102E}
.ffw{grid-column:1/-1}
.sub-btn{width:100%;padding:13px;background:#C8102E;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:background .15s}
.sub-btn:hover{background:#9E0C24}
.sub-btn:disabled{background:#e8909a;cursor:default}
.sw{text-align:center;padding:20px 0}
.si{width:60px;height:60px;border-radius:50%;background:#ecfdf5;border:2px solid #059669;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px}
.stl2{font-family:'EB Garamond',Georgia,serif;font-size:20px;font-weight:700;color:#111827;margin-bottom:6px}
.ssu{font-size:14px;color:#6b7280;line-height:1.7;margin-bottom:16px}
.rp{display:inline-block;background:#f1f5f9;border-radius:8px;padding:10px 20px;font-family:monospace;font-size:15px;font-weight:700;color:#C8102E;letter-spacing:.04em;margin-bottom:20px}
.newb{padding:11px 24px;background:#333F48;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cookchill-box{background:#333F48;border-radius:12px;overflow:hidden;margin-bottom:20px;border:3px solid #C8102E}
.cookchill-img{width:100%;height:auto;display:block}
.cookchill-body{padding:18px 20px}
.cookchill-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#C8102E;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cookchill-tag::before{content:'⚠';font-size:14px}
.cookchill-title{font-family:'EB Garamond',Georgia,serif;font-size:17px;font-weight:700;color:#f1f5f9;margin-bottom:8px;line-height:1.3}
.cookchill-text{font-size:13px;color:#94a3b8;line-height:1.7;margin-bottom:14px}
.cookchill-highlight{background:#C8102E;border-radius:8px;padding:12px 16px;font-size:13px;font-weight:600;color:#fff;line-height:1.5}
.welcome-wrap{padding:0}
.welcome-hero{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:440px;align-items:stretch}
.wh-left{padding:36px 32px 32px;display:flex;flex-direction:column;justify-content:center}
.wh-logo-wrap{margin-bottom:20px;background:none}
.wh-logo{height:52px;width:auto;display:block}
.wh-brand-tagline{font-family:'EB Garamond',Georgia,serif;font-size:13px;font-style:italic;color:#9E0C24;margin-bottom:14px;letter-spacing:.02em}
.wh-tagline{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#C8102E;margin-bottom:10px}
.wh-title{font-family:'EB Garamond',Georgia,serif;font-size:24px;font-weight:700;color:#111827;line-height:1.25;margin-bottom:12px;letter-spacing:-.02em}
.wh-sub{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:24px}
.wh-props{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.wh-prop{display:flex;align-items:center;gap:10px;font-size:12px}
.wh-prop-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.wh-prop-t{font-weight:700;color:#111827;font-size:12px}
.wh-prop-d{color:#6b7280;font-size:11px;margin-top:1px}
.wh-btn{padding:13px 32px;background:#C8102E;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;align-self:flex-start}
.wh-btn:hover{background:#9E0C24}
.wh-right{background:transparent;border-left:1px solid #f1f5f9;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;border-radius:0 0 14px 0}
.wh-kettle{width:100%;max-width:340px;height:auto;object-fit:contain}
.step-nav{display:flex;gap:4px;flex-wrap:nowrap;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.step-nav::-webkit-scrollbar{display:none}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 7px;background:none;border:1px solid rgba(255,255,255,.12);border-radius:7px;cursor:default;font-family:inherit;flex:0 0 auto;min-width:56px;transition:all .15s;opacity:.5}
.step-dot.done{opacity:.85;border-color:rgba(200,16,46,.4);cursor:pointer}
.step-dot.done:hover{background:rgba(200,16,46,.15);opacity:1}
.step-dot.active{opacity:1;border-color:#C8102E;background:rgba(200,16,46,.2);cursor:default}
.step-dot:not(.locked):not(.active){cursor:pointer}
.step-dot:not(.locked):not(.active):hover{opacity:1;background:rgba(255,255,255,.08)}
.step-dot.locked{opacity:.3;cursor:default}
.step-dot-num{font-size:11px;font-weight:700;color:#f1f5f9;line-height:1}
.step-dot.active .step-dot-num{color:#C8102E}
.step-dot.done .step-dot-num{color:#C8102E}
.step-dot-lbl{font-size:9px;color:#64748b;line-height:1;text-align:center;white-space:nowrap}
.step-dot.active .step-dot-lbl{color:#f4a0aa}
.result-back-row{margin-bottom:16px}
.pp-row{margin-bottom:20px}
.pp-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 32px;background:#C8102E;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;text-decoration:none;font-family:'Poppins',system-ui,sans-serif;transition:all .15s;box-shadow:0 4px 16px rgba(200,16,46,.35);letter-spacing:.01em;width:100%}
.pp-btn:hover{background:#9E0C24;box-shadow:0 6px 20px rgba(200,16,46,.45);transform:translateY(-1px)}
.pp-btn:active{transform:translateY(0)}
.wh-fine{font-size:11px;color:#9ca3af;line-height:1.6;padding:14px 32px;border-top:1px solid #f1f5f9;text-align:center}
@media(max-width:520px){.og.c3{grid-template-columns:1fr 1fr}.og.c2{grid-template-columns:1fr}.fg{grid-template-columns:1fr}.rstats{grid-template-columns:1fr 1fr}.calc-grid{grid-template-columns:1fr}.welcome-hero{grid-template-columns:1fr}.wh-right{display:none}.wh-left{padding:28px 20px}.wh-title{font-family:'EB Garamond',Georgia,serif;font-size:20px}}
</style>
</head>

function calcSize(daily,oz,batches,forHA,haSteam,isElectric,isGas){
  var spb=Math.round(daily/batches);
  var raw=(spb*oz)/128;
  var buffered=raw*1.2;
  var pool=forHA?(haSteam?[60,80,100,200]:[60,80,100]):(isElectric?[40,60,80,100]:(isGas?[40,60,80]:SIZES.filter(function(s){return s!==200;})));
  var suggested=null;
  for(var i=0;i<pool.length;i++){if(pool[i]>=buffered){suggested=pool[i];break;}}
  var qty=1;
  if(!suggested){suggested=pool[pool.length-1];qty=Math.ceil(buffered/suggested);}
  return{spb:spb,rawGal:Math.round(raw*10)/10,suggested:suggested,qty:qty};
}

function buildModel(useHA,power,size,tilt){
  var tab,mn,desc;
  var isTop=size<=20;
  var T=tilt==='tilt'?'T':'';  // T suffix = tilting, no suffix = stationary
  if(power==='U')power='D';
  if(useHA&&power==='E')power='D';
  if(useHA){
    var haSz=size<=60?'60':size<=100?'100':'200';
    if(power==='D'){tab='HA-MKDL';mn='HAMKDL'+haSz+(T?'TCC':'CC');desc='Horizontal Agitator Direct Steam Kettle'+(T?' — Tilting':' — Stationary');}
    else{tab='HA-MKGL';mn='HAMKGL'+haSz+(T?'T':'');desc='Horizontal Agitator Gas Kettle'+(T?' — Tilting':' — Stationary');}
  }else if(isTop){
    if(power==='D'){tab='MKDT';mn='MKDT'+size+'T';desc='Vertical Mixer Kettle — Tabletop, Direct Steam';}
    else{tab='MKET';mn='MKET'+size+'T';desc='Vertical Mixer Kettle — Tabletop, Electric';}
  }else{
    if(power==='D'){tab='MKDL';mn='MKDL'+size+(T?'T':'');desc='Vertical Mixer Kettle — Floor, Direct Steam'+(T?' — Tilting':' — Stationary');}
    else if(power==='G'){tab='MKGLT';mn='MKGL'+size+(T?'T':'');desc='Vertical Mixer Kettle — Floor, Gas'+(T?' — Tilting':' — Stationary');}
    else{tab='MKEL';mn='MKEL'+size+(T?'T':'');desc='Vertical Mixer Kettle — Floor, Electric'+(T?' — Tilting':' — Stationary');}
  }
  return{tab:tab,mn:mn,desc:desc,useHA:useHA,power:power};
}

function totalSteps(){return S.op==='corrections'?9:8;}
function foodObj(){return FOODS.find(function(f){return f.v===S.food;})||null;}
function opObj(){return OPS.find(function(o){return o.v===S.op;})||null;}
function useHA(){
  if(!S.food||S.haOverride)return false;
  var fo=foodObj();
  if(!fo)return false;
  if(S.power==='E')return false;
  return fo.visc==='suspended'||fo.visc==='thick';
}
function haAvailable(){return S.power==='D'||S.power==='G'||S.power==='U';}

function goNext(){
  if(S.step===6&&S.pumping===false){S.tilt='tilt';}
  if(S.step===8&&S.op!=='corrections'){goResult();return;}
  if(S.step===9){goResult();return;}
  S.step++;render();
}

function goResult(){
  S.step='result';render();fetchAI();
}

function getResult(){
  var ha=useHA();
  var sz=S.size||S.suggestedSize||60;
  if(ha&&sz<60)sz=60;
  return buildModel(ha,S.power,sz,S.tilt);
}

function fetchAI(){
  var m=getResult(),fo=foodObj(),oo=opObj();
  var sz=S.size||S.suggestedSize||60;
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:'You are a Cleveland Range mixer kettle sales specialist writing a 2-3 sentence confirmation for a customer on a website. Customer: '+( oo?oo.l:'unknown')+' operation, cooking '+(fo?fo.l:'unknown')+', '+S.daily+' daily servings at '+S.oz+'oz, '+S.batches+' batches/day. Recommended: '+m.mn+' ('+sz+' gal) — '+m.desc+'. Write warmly and directly. Mention one benefit for their food type. No jargon, no markdown.'}]})})
  .then(function(r){return r.json();})
  .then(function(d){S.aiText=d.content&&d.content.map(function(b){return b.text||'';}).join('')||'';render();})
  .catch(function(){S.aiText='';render();});
}

function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function on(e,ev,fn){e.addEventListener(ev,fn);return e;}
function hdr2(ey,ttl,sub){var f=el('div');f.appendChild(el('div','ey',ey));f.appendChild(el('div','ttl',ttl));if(sub)f.appendChild(el('div','sub',sub));return f;}

function optGrid(items,cols,sel,cb){
  var g=el('div','og c'+cols);
  items.forEach(function(item){
    var v=item.v!==undefined?item.v:item,isRec=item.recommended;
    var b=el('button','oc'+(sel===v?' sel':'')+(isRec?' rec-opt':''));
    if(isRec)b.appendChild(el('span','rec-badge','Recommended'));
    if(item.e)b.appendChild(el('span','oe',item.e));
    var tx=el('div');tx.appendChild(el('div','ol',item.l||v));if(item.s)tx.appendChild(el('div','os',item.s));b.appendChild(tx);
    on(b,'click',(function(val){return function(){cb(val);};})(v));
    g.appendChild(b);
  });
  return g;
}

function updateCalc(){
  if(S.oz&&S.batches&&S.daily){
    var c=calcSize(S.daily,S.oz,S.batches,useHA(),(S.power==='D'||S.power==='U'),S.power==='E',S.power==='G'&&!useHA());
    var prevSuggested=S.suggestedSize;
    S.suggestedSize=c.suggested;
    // Only auto-update size if user hasn't manually picked one,
    // OR if the previously suggested size was what they had (i.e. they hadn't overridden)
    if(!S.size||S.size===prevSuggested){S.size=c.suggested;}
  }
}

function updateCalcBatch(){
  if(S.batchGal&&S.batches){
    var pool;
    if(useHA()){pool=(S.power==='D'||S.power==='U')?[60,80,100,200]:[60,80,100];}
    else if(S.power==='E'){pool=[40,60,80,100];}
    else if(S.power==='G'){pool=[40,60,80];}
    else{pool=SIZES.filter(function(s){return s!==200;});}
    var needed=S.batchGal*1.1; // 10% buffer
    var suggested=null;
    for(var i=0;i<pool.length;i++){if(pool[i]>=needed){suggested=pool[i];break;}}
    if(!suggested)suggested=pool[pool.length-1];
    var prevSuggested=S.suggestedSize;
    S.suggestedSize=suggested;
    if(!S.size||S.size===prevSuggested){S.size=suggested;}
  }
}
